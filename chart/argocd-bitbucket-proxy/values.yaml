# -- Number of replicas
replicaCount: 1

image:
  # -- Container image repository
  repository: ghcr.io/salemgolemugoo/argocd-bitbucket-proxy
  # -- Container image tag
  tag: latest
  # -- Image pull policy
  pullPolicy: IfNotPresent

service:
  # -- Kubernetes service type
  type: ClusterIP
  # -- Service port
  port: 8080

env:
  # -- ArgoCD ApplicationSet webhook URL to forward translated payloads to
  argocdWebhookURL: "http://argocd-applicationset-controller.argocd.svc.cluster.local:7000/api/webhook"
  # -- Log level (debug, info, warn, error)
  logLevel: "info"

secrets:
  # -- HMAC secret for validating Bitbucket Server webhooks
  bitbucketServerSecret: ""
  # -- HMAC secret for validating Bitbucket Cloud webhooks
  bitbucketCloudSecret: ""

resources:
  requests:
    # -- CPU request
    cpu: 50m
    # -- Memory request
    memory: 64Mi
  limits:
    # -- CPU limit
    cpu: 200m
    # -- Memory limit
    memory: 128Mi

# -- Node selector for pod scheduling
nodeSelector: {}
# -- Tolerations for pod scheduling
tolerations: []
# -- Affinity rules for pod scheduling
affinity: {}
